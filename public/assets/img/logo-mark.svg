<!-- ADY Motors — icon only (64×64), use for avatars, app icons, social -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="ADY Motors">
    <!-- Tile -->
    <rect width="64" height="64" rx="14" fill="#0A0A0A"/>
    <rect x="0.5" y="0.5" width="63" height="63" rx="13.5" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

    <!-- A letterform (centered, scaled to 64-tile) -->
    <path d="M14 50 L26 14 L29 14 L41 50 L36 50 L33 41 L22 41 L19 50 Z" fill="#FFFFFF"/>
    <!-- A crossbar -->
    <rect x="22.5" y="35" width="10" height="3" fill="#FFFFFF"/>

    <!-- Two motion lines exiting right (export signature) -->
    <line x1="44" y1="26" x2="54" y2="26" stroke="#0057FF" stroke-width="3" stroke-linecap="square"/>
    <line x1="44" y1="36" x2="56" y2="36" stroke="#0057FF" stroke-width="3" stroke-linecap="square"/>
</svg>
