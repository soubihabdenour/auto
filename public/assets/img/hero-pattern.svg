<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
    <defs>
        <pattern id="lines" width="32" height="32" patternUnits="userSpaceOnUse" patternTransform="rotate(15)">
            <line x1="0" y1="0" x2="0" y2="32" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
        </pattern>
        <radialGradient id="halo" cx="0.5" cy="0.0" r="0.8">
            <stop offset="0" stop-color="#CD2E3A" stop-opacity="0.18"/>
            <stop offset="1" stop-color="#CD2E3A" stop-opacity="0"/>
        </radialGradient>
    </defs>
    <rect width="800" height="400" fill="url(#lines)"/>
    <rect width="800" height="400" fill="url(#halo)"/>
</svg>
