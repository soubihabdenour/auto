<!-- ADY Motors — horizontal logo, white wordmark for dark backgrounds (footer, hero) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 64" role="img" aria-label="ADY Motors">
    <!-- ===== Mark — frosted glass tile + white A + accent motion lines ===== -->
    <g>
        <rect x="8" y="8" width="48" height="48" rx="10" fill="rgba(255,255,255,0.08)"/>
        <rect x="8.5" y="8.5" width="47" height="47" rx="9.5" fill="none" stroke="rgba(255,255,255,0.20)"/>

        <!-- A letterform -->
        <path d="M16 44 L24 20 L26 20 L34 44 L31 44 L29 39 L21 39 L19 44 Z" fill="#FFFFFF"/>
        <rect x="21.5" y="34.5" width="7" height="2.2" fill="#FFFFFF"/>

        <!-- Two motion lines exiting right -->
        <line x1="40" y1="28" x2="48" y2="28" stroke="#0057FF" stroke-width="2.5" stroke-linecap="square"/>
        <line x1="40" y1="36" x2="50" y2="36" stroke="#0057FF" stroke-width="2.5" stroke-linecap="square"/>
    </g>

    <!-- ===== Wordmark (white) ===== -->
    <g font-family="Inter, system-ui, -apple-system, 'Segoe UI', sans-serif" fill="#FFFFFF">
        <text x="80" y="32" font-size="26" font-weight="800" letter-spacing="-0.02em">ADY</text>
        <text x="80" y="50" font-size="11" font-weight="600" letter-spacing="0.30em" fill="rgba(255,255,255,0.65)">MOTORS</text>
    </g>
</svg>
